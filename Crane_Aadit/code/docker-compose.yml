services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sparkline
      POSTGRES_PASSWORD: sparkline
      POSTGRES_DB: sparkline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkline -d sparkline"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://sparkline:sparkline@db:5432/sparkline
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 12

  seed:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://sparkline:sparkline@db:5432/sparkline
      SEED_FILE: /app/data/readings_seed.json
    command: ["python", "scripts/seed.py"]
    depends_on:
      api:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
